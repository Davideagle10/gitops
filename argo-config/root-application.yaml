apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Davideagle10/gitops
    targetRevision: main
    path: argo-config/apps        
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd             
  syncPolicy:
    automated:
      prune: true
      selfHeal: true